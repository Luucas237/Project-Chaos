services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chaos-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:5173}
    networks:
      - chaos-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chaos-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    environment:
      - VITE_SERVER_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - chaos-net

networks:
  chaos-net:
    driver: bridge
